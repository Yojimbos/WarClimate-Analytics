apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: war-climate-analytics
  namespace: app
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - demo.example.com
      secretName: war-climate-analytics-tls
  rules:
    - host: demo.example.com
      http:
        paths:
          - path: /health
            pathType: Exact
            backend:
              service:
                name: war-climate-analytics-api
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: war-climate-analytics-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: war-climate-analytics-frontend
                port:
                  number: 80
