apiVersion: batch/v1
kind: CronJob
metadata:
  name: war-climate-analytics-ingestion
  namespace: app
spec:
  schedule: "15 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: war-climate-analytics-api
          containers:
            - name: ingest
              image: acrplaceholder.azurecr.io/war-climate-analytics-api:latest
              imagePullPolicy: Always
              command: ["python", "-m", "app.cli", "ingest", "--days", "30", "--location", "kharkiv"]
              envFrom:
                - configMapRef:
                    name: war-climate-analytics-config
                - secretRef:
                    name: war-climate-analytics-secrets
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
