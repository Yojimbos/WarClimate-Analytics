apiVersion: batch/v1
kind: CronJob
metadata:
  name: enemy-losses-ingestion
  namespace: app
spec:
  schedule: "15 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: enemy-losses-api
          containers:
            - name: ingest
              image: acrplaceholder.azurecr.io/enemy-losses-api:latest
              command: ["python", "-m", "app.cli", "ingest", "--days", "30", "--location", "kyiv"]
              envFrom:
                - configMapRef:
                    name: enemy-losses-config
                - secretRef:
                    name: enemy-losses-secrets
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]

