apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: war-climate-analytics-api
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - app
  selector:
    matchLabels:
      app: war-climate-analytics-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s

