apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Ingress
      name: war-climate-analytics
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: war-climate-analytics.40.127.195.251.sslip.io
      - op: replace
        path: /spec/tls/0/hosts/0
        value: war-climate-analytics.40.127.195.251.sslip.io
  - target:
      kind: ConfigMap
      name: war-climate-analytics-config
    patch: |-
      - op: replace
        path: /data/CORS_ORIGINS
        value: https://war-climate-analytics.40.127.195.251.sslip.io
images:
  - name: acrplaceholder.azurecr.io/war-climate-analytics-api
    newName: acrwarclimateanalyticsdevseumu.azurecr.io/war-climate-analytics-api
    newTag: 8c1dbf66d61fdcc00ebd3bbd7c45d251b9f2cc11
  - name: acrplaceholder.azurecr.io/war-climate-analytics-frontend
    newName: acrwarclimateanalyticsdevseumu.azurecr.io/war-climate-analytics-frontend
    newTag: 8c1dbf66d61fdcc00ebd3bbd7c45d251b9f2cc11
