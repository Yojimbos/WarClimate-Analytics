apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Ingress
      name: war-climate-analytics
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: war-climate-analytics.128.251.12.42.sslip.io
      - op: replace
        path: /spec/tls/0/hosts/0
        value: war-climate-analytics.128.251.12.42.sslip.io
  - target:
      kind: ConfigMap
      name: war-climate-analytics-config
    patch: |-
      - op: replace
        path: /data/CORS_ORIGINS
        value: https://war-climate-analytics.128.251.12.42.sslip.io
images:
  - name: acrplaceholder.azurecr.io/war-climate-analytics-api
    newName: acrwarclimateanalyticsdevseumu.azurecr.io/war-climate-analytics-api
    newTag: 8badcb8c21a67911c959c11f80ed735da1524f8d
  - name: acrplaceholder.azurecr.io/war-climate-analytics-frontend
    newName: acrwarclimateanalyticsdevseumu.azurecr.io/war-climate-analytics-frontend
    newTag: 8badcb8c21a67911c959c11f80ed735da1524f8d
