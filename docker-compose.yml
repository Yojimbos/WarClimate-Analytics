services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: war_climate_analytics
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d war_climate_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://demo:demo@postgres:5432/war_climate_analytics
      WEATHER_PROVIDER: open-meteo
      LOSSES_PROVIDER: official
      ADMIN_API_KEY: dev-admin-key
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro

volumes:
  postgres_data:
