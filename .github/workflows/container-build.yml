name: container-build

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/container-build.yml"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  PROJECT_NAME: war-climate-analytics
  ENVIRONMENT: dev

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: backend/Dockerfile
            image: war-climate-analytics-api
            context: backend
          - name: frontend
            dockerfile: frontend/Dockerfile
            image: war-climate-analytics-frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Discover ACR from Azure
        id: acr
        shell: bash
        run: |
          RG_NAME="${PROJECT_NAME}-${ENVIRONMENT}-rg"
          ACR_NAME=$(az acr list --resource-group "$RG_NAME" --query "[0].name" -o tsv)
          ACR_LOGIN_SERVER=$(az acr list --resource-group "$RG_NAME" --query "[0].loginServer" -o tsv)
          if [ -z "$ACR_NAME" ] || [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "ACR not found in resource group $RG_NAME"
            exit 1
          fi
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
      - name: Login to ACR
        run: az acr login --name "${{ steps.acr.outputs.name }}"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.acr.outputs.login_server }}/${{ matrix.image }}:${{ github.sha }}
