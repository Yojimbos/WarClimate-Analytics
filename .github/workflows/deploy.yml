name: deploy

on:
  workflow_run:
    workflows: ["container-build"]
    types: [completed]

permissions:
  contents: write

jobs:
  update-flux-images:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update image tags
        env:
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          path = Path("k8s/overlays/dev/kustomization.yaml")
          text = path.read_text(encoding="utf-8")
          image_sha = __import__("os").environ["IMAGE_SHA"]
          text = re.sub(r"newTag:\s+\S+", f"newTag: {image_sha}", text)
          path.write_text(text, encoding="utf-8")
          PY
      - name: Commit image tag update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update flux image tag ${IMAGE_SHA}" || exit 0
          git push
