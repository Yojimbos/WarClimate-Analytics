name: deploy

on:
  workflow_run:
    workflows: ["container-build"]
    types: [completed]

permissions:
  id-token: write
  contents: read

env:
  PROJECT_NAME: war-climate-analytics
  ENVIRONMENT: dev

jobs:
  rollout-latest:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Discover AKS from Azure
        id: aks
        shell: bash
        run: |
          RG_NAME="${PROJECT_NAME}-${ENVIRONMENT}-rg"
          AKS_NAME=$(az aks list --resource-group "$RG_NAME" --query "[0].name" -o tsv)
          if [ -z "$AKS_NAME" ]; then
            echo "AKS not found in resource group $RG_NAME"
            exit 1
          fi
          echo "resource_group=$RG_NAME" >> "$GITHUB_OUTPUT"
          echo "name=$AKS_NAME" >> "$GITHUB_OUTPUT"
      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ steps.aks.outputs.resource_group }}" \
            --name "${{ steps.aks.outputs.name }}" \
            --overwrite-existing
      - name: Restart workloads to pull latest images
        run: |
          kubectl rollout restart deployment/war-climate-analytics-api -n app
          kubectl rollout restart deployment/war-climate-analytics-frontend -n app
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/war-climate-analytics-api -n app --timeout=10m
          kubectl rollout status deployment/war-climate-analytics-frontend -n app --timeout=10m
